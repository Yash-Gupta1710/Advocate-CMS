# Server Configuration
server.port=8080

# Spring Data Source - H2 Database (Default)
spring.datasource.url=jdbc:h2:mem:advocatedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Security Headers & Frames Config (for H2 console compatibility)
spring.headers.frame-options.disable=true

# JWT Configuration (Secret is a 256-bit hex key)
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000

# File Upload Configuration
app.file.upload-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Enable lazy initialization for quick startup (optional, keep false for complete dependency verification)
spring.main.lazy-initialization=false
